<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoRadar - Iniciar sesión</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffffff;
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    color: #111;
    overflow-x: hidden;
  }

  /* ── LAYOUT PRINCIPAL (SPLIT SCREEN) ── */
  .main-container {
    display: flex;
    min-height: 100vh;
  }

  .form-side {
    width: 45%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px;
    background: #ffffff;
    z-index: 10;
    box-shadow: 10px 0 30px rgba(0,0,0,0.03);
  }

  .visual-side {
    width: 55%;
    background: #f4f8f5;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── CUADRÍCULA ESTILO PINTEREST ── */
  .pinterest-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    width: 120%;
    transform: rotate(-8deg) scale(1.1);
    pointer-events: none;
  }

  .pin-item {
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
  }

  .pin-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .pin-tall { height: 350px; }
  .pin-short { height: 220px; }
  .pin-mid { height: 280px; }

  .col-1 { margin-top: -50px; display: flex; flex-direction: column; gap: 20px; }
  .col-2 { margin-top: 50px; display: flex; flex-direction: column; gap: 20px; }
  .col-3 { margin-top: -20px; display: flex; flex-direction: column; gap: 20px; }

  /* ── ESTILOS DEL FORMULARIO ── */
  .page {
    width: 100%;
    max-width: 380px;
    animation: fadeIn 0.6s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  h1 {
    font-size: 36px;
    font-weight: 900;
    color: #111;
    margin-bottom: 8px;
    line-height: 1.2;
    letter-spacing: -0.5px;
  }

  .subtitle {
    font-size: 16px;
    color: #666;
    font-weight: 600;
    margin-bottom: 32px;
  }

  .field-label {
    font-size: 14px;
    font-weight: 800;
    color: #333;
    margin-bottom: 8px;
    margin-top: 16px;
  }

  .field-label:first-of-type { margin-top: 0; }

  .input-wrap { position: relative; width: 100%; }

  .input-wrap input {
    width: 100%;
    padding: 16px 44px 16px 18px;
    border: 2px solid #eaeaea;
    border-radius: 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #111;
    outline: none;
    background: #fafafa;
    transition: all 0.2s;
  }

  .input-wrap input:focus {
    border-color: #2e7d32;
    background: #fff;
    box-shadow: 0 4px 12px rgba(46,125,50,0.1);
  }

  .eye-btn {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
    color: #888;
    user-select: none;
  }

  .forgot {
    color: #2e7d32;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    margin-top: 12px;
    margin-bottom: 24px;
    display: inline-block;
    text-decoration: none;
  }
  .forgot:hover { text-decoration: underline; }

  .signin-btn {
    width: 100%;
    padding: 16px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 32px;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: background 0.2s, transform 0.15s;
    margin-bottom: 16px;
  }
  .signin-btn:hover { background: #1b5e20; transform: translateY(-2px); }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 10px 0 20px;
  }
  .divider-line { flex: 1; height: 1px; background: #eaeaea; }
  .divider-text { font-size: 13px; color: #888; font-weight: 800; text-transform: uppercase; }

  /* Contenedor donde Google inyectará el botón oficial */
  #boton-google-real {
    width: 100%;
    display: flex;
    justify-content: center;
    margin-bottom: 12px;
  }

  .links {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-top: 24px;
  }

  .link-line { font-size: 14px; color: #555; font-weight: 600; text-align: center; }
  .link-line a { color: #2e7d32; font-weight: 900; text-decoration: none; }
  .link-line a:hover { text-decoration: underline; }

  @media (max-width: 900px) {
    .main-container { flex-direction: column; }
    .form-side { width: 100%; padding: 20px; min-height: 100vh; justify-content: flex-start; padding-top: 60px; }
    .visual-side { display: none; }
  }
</style>
</head>
<body>

<div class="main-container">
  
  <div class="form-side">
    <div class="page">
      
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:40px;">
        <span style="font-size:36px; line-height:1;">📡</span>
        <span style="font-size:32px; font-weight:900; letter-spacing:-0.5px;">
          <span style="color:#2e7d32;">Eco</span><span style="color:#111;">Radar</span>
        </span>
      </div>

      <h1>Descubre, Reporta,<br>Transforma.</h1>
      <p class="subtitle">Encuentra soluciones a los problemas de tu ciudad.</p>

      <div class="field-label">Correo electrónico</div>
      <div class="input-wrap">
        <input type="email" id="correo" placeholder="ejemplo@ecoradar.com">
      </div>

      <div class="field-label">Contraseña</div>
      <div class="input-wrap">
        <input type="password" id="contrasena" placeholder="Escribe tu contraseña">
        <span class="eye-btn" onclick="togglePass()">👁️</span>
      </div>

      <a class="forgot" href="#">¿Olvidaste tu contraseña?</a>

      <button class="signin-btn" onclick="iniciarSesion(event)">Iniciar sesión</button>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">o</span>
        <div class="divider-line"></div>
      </div>

      <div id="boton-google-real"></div>

      <div class="links">
        <div class="link-line">¿Aún no estás en EcoRadar? <a href="#">Regístrate</a></div>
        <div class="link-line">¿Representas a una empresa municipal? <a href="#">Empieza aquí</a></div>
      </div>

    </div>
  </div>

  <div class="visual-side">
    <div class="pinterest-grid">
      <div class="col-1">
        <div class="pin-item pin-tall"><img src="https://picsum.photos/id/122/600/800" alt="Ciudad"></div>
        <div class="pin-item pin-short"><img src="https://picsum.photos/id/248/600/500" alt="Naturaleza"></div>
      </div>
      <div class="col-2">
        <div class="pin-item pin-short"><img src="https://picsum.photos/id/164/600/500" alt="Infraestructura"></div>
        <div class="pin-item pin-tall"><img src="https://picsum.photos/id/318/600/800" alt="Urbano"></div>
      </div>
      <div class="col-3">
        <div class="pin-item pin-mid"><img src="https://picsum.photos/id/338/600/700" alt="Calles"></div>
        <div class="pin-item pin-tall"><img src="https://picsum.photos/id/416/600/800" alt="Vías"></div>
      </div>
    </div>
  </div>

</div>

<script>
  // 1. Decodificar el token seguro enviado por Google
  function parseJwt(token) {
      var base64Url = token.split('.')[1];
      var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
          return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));
      return JSON.parse(jsonPayload);
  }

  // 2. Capturar respuesta de autenticación exitosa
  function manejarRespuestaGoogle(response) {
      const datosUsuario = parseJwt(response.credential);
      
      console.log("Acceso autorizado por Google Auth", datosUsuario);

      // Almacenamos credenciales reales en LocalStorage
      localStorage.setItem('eco_token', response.credential);
      localStorage.setItem('eco_admin', datosUsuario.name); // Guarda tu nombre real de Gmail
      
      // Redirección directa al Dashboard operativo
      window.location.href = 'ecoradar-admin.html';
  }

  // 3. Inicializar el botón oficial con tu Client ID Real
  window.onload = function () {
      google.accounts.id.initialize({
          client_id: "60446652956-lgqajq1c43js23ek2tc1lrf96u0ru6lc.apps.googleusercontent.com", 
          callback: manejarRespuestaGoogle
      });
      
      google.accounts.id.renderButton(
          document.getElementById("boton-google-real"),
          { theme: "outline", size: "large", width: "100%", shape: "pill", text: "continue_with" }  
      );
  }

  function togglePass() {
    const i = document.getElementById('contrasena');
    i.type = i.type === 'password' ? 'text' : 'password';
  }

  // Conexión tradicional por correo vinculada a tu backend en Render
  async function iniciarSesion(event) {
        event.preventDefault(); 
        const correo = document.getElementById('correo').value;
        const contrasena = document.getElementById('contrasena').value;

        try {
           const response = await fetch('https://ecoradar-api.onrender.com/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ correo, contrasena })
        });
            const data = await response.json();
            if (response.ok) {
                localStorage.setItem('eco_token', data.token);
                localStorage.setItem('eco_admin', data.usuario);
                window.location.href = 'ecoradar-admin.html';
            } else {
                alert("Acceso denegado: " + data.error);
            }
        } catch (error) {
            alert("No se pudo conectar con el servidor.");
        }
    }
</script>

</body>
</html>
